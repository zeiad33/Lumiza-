<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumiza | لوميزا</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0c0a08;
    --bg-1:#151009;
    --gold:#c9a24a;
    --gold-light:#ecd6a3;
    --gold-dim:#8a6f3a;
    --blush:#d9a892;
    --cream:#f3ead9;
    --muted:#a2917a;
    --wa:#3fae6a;
    --fb:#5b84c4;
    --ig-1:#e29a5a;
    --ig-2:#c2588c;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse 60% 45% at 50% 8%, rgba(201,162,74,0.14), transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(217,168,146,0.07), transparent 60%),
      var(--bg-0);
    color:var(--cream);
    font-family:'Tajawal', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }

  .stage{
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:56px 20px 80px;
  }

  .card{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  /* ---- logo with ambient glow, echoing the coin/medallion ---- */
  .medallion{
    position:relative;
    width:172px;
    height:172px;
    margin-bottom:6px;
  }
  .medallion::before{
    content:"";
    position:absolute;
    inset:-38px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(201,162,74,0.35) 0%, rgba(201,162,74,0.08) 45%, transparent 72%);
    filter:blur(2px);
    animation:breathe 6s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{ transform:scale(1); opacity:0.9; }
    50%{ transform:scale(1.06); opacity:1; }
  }
  .medallion img{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    box-shadow:
      0 0 0 1px rgba(201,162,74,0.5),
      0 18px 40px -12px rgba(0,0,0,0.7);
  }

  .eyebrow{
    margin-top:22px;
    font-family:'Tajawal', sans-serif;
    font-weight:400;
    font-size:12.5px;
    letter-spacing:0.32em;
    color:var(--muted);
    text-transform:uppercase;
  }

  .tagline{
    margin-top:10px;
    font-size:15px;
    font-weight:400;
    color:var(--blush);
    line-height:1.9;
    max-width:300px;
  }

  /* ornamental divider echoing the logo's laurel branch */
  .divider{
    width:100%;
    max-width:280px;
    margin:26px 0 24px;
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--gold-dim);
  }
  .divider .line{
    flex:1;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .divider svg{ width:22px; height:22px; flex:none; opacity:0.85; }

  .phone{
    display:inline-flex;
    align-items:center;
    gap:9px;
    text-decoration:none;
    color:var(--gold-light);
    font-family:'Tajawal', sans-serif;
    font-weight:500;
    font-size:18px;
    letter-spacing:0.06em;
    padding:8px 22px;
    border:1px solid rgba(201,162,74,0.4);
    border-radius:999px;
    margin-bottom:30px;
    transition:border-color .25s ease, background .25s ease, transform .25s ease;
    background:rgba(201,162,74,0.05);
  }
  .phone:hover{
    border-color:var(--gold);
    background:rgba(201,162,74,0.12);
    transform:translateY(-1px);
  }
  .phone svg{ width:17px; height:17px; }
  .phone span{
    direction:ltr;
    unicode-bidi:plaintext;
    font-variant-numeric:tabular-nums;
  }

  .links{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .link-btn{
    position:relative;
    display:flex;
    align-items:center;
    gap:16px;
    width:100%;
    padding:15px 20px;
    border-radius:16px;
    text-decoration:none;
    color:var(--cream);
    background:linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
    border:1px solid rgba(201,162,74,0.28);
    overflow:hidden;
    transition:transform .22s ease, border-color .22s ease, background .22s ease;
  }
  .link-btn:hover{
    transform:translateY(-2px);
    border-color:rgba(201,162,74,0.65);
    background:linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  }
  .link-btn:active{ transform:translateY(0px) scale(0.99); }

  .link-btn .icon{
    flex:none;
    width:42px;
    height:42px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .link-btn .icon svg{ width:22px; height:22px; }

  .icon.wa{ background:rgba(63,174,106,0.14); color:var(--wa); }
  .icon.wa-channel{ background:rgba(63,174,106,0.14); color:var(--wa); }
  .icon.fb{ background:rgba(91,132,196,0.14); color:var(--fb); }
  .icon.ig{ background:linear-gradient(135deg, rgba(226,154,90,0.18), rgba(194,88,140,0.18)); color:var(--ig-2); }

  .link-text{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:2px;
    text-align:right;
  }
  .link-text .title{
    font-size:15.5px;
    font-weight:500;
    color:var(--cream);
  }
  .link-text .sub{
    font-size:12px;
    color:var(--muted);
    font-weight:300;
  }

  .link-btn .arrow{
    margin-right:auto;
    color:var(--gold-dim);
    transition:transform .22s ease, color .22s ease;
  }
  .link-btn:hover .arrow{ transform:translateX(-4px); color:var(--gold); }

  footer{
    margin-top:44px;
    font-size:11px;
    letter-spacing:0.18em;
    color:var(--gold-dim);
    text-transform:uppercase;
  }
</style>
</head>
